name: VEF Dashboard Sync

on:
  # schedule:
  #   - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: vef-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Selaras ke main terkini
        run: |
          echo "=== VEF SYNC v3 ==="
          git config user.name "vef-bot"
          git config user.email "vef-bot@users.noreply.github.com"
          git fetch origin main
          git reset --hard origin/main

      - name: Tarik vef-data.json dari OneDrive
        env:
          VEF_URL: ${{ secrets.VEF_URL }}
        run: |
          curl -fL -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
               -c /tmp/cj.txt -b /tmp/cj.txt \
               "$VEF_URL" -o data.json
          python3 -c "import json; json.load(open('data.json')); print('JSON OK')"

      - name: Commit & push
        run: |
          git add data.json
          if git diff --staged --quiet; then
            echo "Takde perubahan."
            exit 0
          fi
          git commit -m "VEF sync: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push origin HEAD:main
